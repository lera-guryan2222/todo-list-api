[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "C", "B", "UP"
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**/*.py" = ["E402"]  # Игнорируем E402 в тестах

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
asyncio_mode = "auto"
pythonpath = ["backend"]  # ← ВАЖНО! Добавляет backend в путь
addopts = "--cov=app --cov-report=term --cov-report=html --cov-fail-under=50"

[tool.mypy]
ignore_missing_imports = true