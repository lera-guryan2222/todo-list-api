services:
  postgres:
    build: ./db           
    container_name: todo-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-todo_db}
      POSTGRES_USER: ${DB_USER:-todo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-todo_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-todo_user} -d ${DB_NAME:-todo_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: todo-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-todo_user}:${DB_PASSWORD:-todo_password}@postgres:5432/${DB_NAME:-todo_db}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todo-network
    volumes:
      - ./backend:/app

networks:
  todo-network:
    driver: bridge

volumes:
  postgres_data: